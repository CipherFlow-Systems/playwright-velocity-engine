name: Playwright CI Pipeline
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  e2e-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    # This matrix configuration handles sharding to split tests across multiple parallel containers
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2]
        shardTotal: [2]

    steps:
    - name: Checkout Codebase
      uses: actions/checkout@v4

    - name: Initialize Node.js Environment
      uses: actions/actions-setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'

    - name: Install Project Dependencies
      run: npm ci

    - name: Install Playwright Isolated Browsers
      run: npx playwright install --with-deps

    - name: Execute Parallel Sharded Automated Test Suite
      run: npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

    - name: Upload Failure Artifacts & Performance Traces
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: playwright-execution-report-shard-${{ matrix.shardIndex }}
        path: playwright-report/
        retention-days: 14
